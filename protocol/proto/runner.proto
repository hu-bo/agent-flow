syntax = "proto3";

package agentflow.runner.v1;

option go_package = "github.com/agent-flow/runner/protocol/proto;runnerpb";

enum Engine {
  ENGINE_UNSPECIFIED = 0;
  ENGINE_HOST = 1;
  ENGINE_DOCKER = 2;
}

enum TaskEventType {
  TASK_EVENT_TYPE_UNSPECIFIED = 0;
  TASK_EVENT_TYPE_STARTED = 1;
  TASK_EVENT_TYPE_STDOUT = 2;
  TASK_EVENT_TYPE_STDERR = 3;
  TASK_EVENT_TYPE_PROGRESS = 4;
  TASK_EVENT_TYPE_RESULT = 5;
  TASK_EVENT_TYPE_ERROR = 6;
  TASK_EVENT_TYPE_COMPLETED = 7;
  TASK_EVENT_TYPE_HEARTBEAT = 8;
}

message TaskRequest {
  string task_id = 1;
  string session_id = 2;
  string step_id = 3;
  string command = 4;
  repeated string args = 5;
  map<string, string> env = 6;
  string working_dir = 7;
  int64 timeout_ms = 8;
  bool stream = 9;
  string auth_token = 10;
  bytes input_json = 11;
  Engine engine = 12;
  SandboxPolicy sandbox_policy = 13;
  DockerSpec docker = 14;
}

message SandboxPolicy {
  bool enabled = 1;
  bool read_only = 2;
  bool allow_network = 3;
  repeated string allowed_working_dirs = 4;
  repeated string allowed_read_paths = 5;
  repeated string allowed_write_paths = 6;
  repeated string blocked_command_fragments = 7;
  repeated string allowed_env_keys = 8;
  repeated string denied_env_keys = 9;
}

message DockerMount {
  string source = 1;
  string target = 2;
  bool read_only = 3;
}

message DockerSpec {
  string image = 1;
  string work_dir = 2;
  string user = 3;
  bool network_disabled = 4;
  bool read_only_root_fs = 5;
  repeated DockerMount mounts = 6;
}

message CancelTaskRequest {
  string task_id = 1;
  string reason = 2;
}

message CancelTaskResponse {
  bool accepted = 1;
  string message = 2;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string version = 2;
  int64 unix_time = 3;
}

message StartedPayload {
  string message = 1;
}

message StreamPayload {
  string chunk = 1;
}

message ProgressPayload {
  string message = 1;
  uint32 percent = 2;
}

message ResultPayload {
  int32 exit_code = 1;
  bytes output_json = 2;
}

message ErrorPayload {
  string message = 1;
  bool retryable = 2;
}

message CompletedPayload {
  int32 exit_code = 1;
  uint64 duration_ms = 2;
}

message HeartbeatPayload {
  string message = 1;
}

message TaskEvent {
  string task_id = 1;
  string session_id = 2;
  string step_id = 3;
  TaskEventType type = 4;
  string timestamp = 5;
  string runner_id = 6;

  oneof payload {
    StartedPayload started = 20;
    StreamPayload stdout = 21;
    StreamPayload stderr = 22;
    ProgressPayload progress = 23;
    ResultPayload result = 24;
    ErrorPayload error = 25;
    CompletedPayload completed = 26;
    HeartbeatPayload heartbeat = 27;
  }
}

message ConnectRegister {
  string runner_token = 1;
  string runner_id = 2;
  string kind = 3;
  string host = 4;
  string version = 5;
  repeated string capabilities = 6;
}

message ConnectRegisterAck {
  string runner_id = 1;
  string status = 2;
  int64 heartbeat_interval_ms = 3;
  string server_time = 4;
}

message ConnectHeartbeat {
  string runner_id = 1;
  string runner_token = 2;
  string timestamp = 3;
}

message ServerPing {
  string server_time = 1;
}

message RunnerEnvelope {
  oneof payload {
    ConnectRegister register = 1;
    ConnectHeartbeat heartbeat = 2;
    TaskEvent task_event = 3;
  }
}

message ServerEnvelope {
  oneof payload {
    ConnectRegisterAck register_ack = 1;
    TaskRequest run_task = 2;
    CancelTaskRequest cancel_task = 3;
    ServerPing ping = 4;
  }
}

service RunnerService {
  rpc Connect(stream RunnerEnvelope) returns (stream ServerEnvelope);
  rpc RunTask(TaskRequest) returns (stream TaskEvent);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}
