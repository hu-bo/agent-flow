version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/sqlc/query/"
    schema: "internal/database/sqlc/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/database/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
